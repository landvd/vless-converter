strategy:
  matrix:
    python-version: ["3.11"]

steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: ${{ matrix.python-version }}

  - name: Show Python version
    run: python --version

  - name: Run unit tests
    run: python -m unittest discover -s tests -v